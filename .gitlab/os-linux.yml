---
# Linux-specific builder configurations and build commands
# yamllint disable rule:colons
.linux:
  variables:
    GIT_CLONE_PATH:           "$CI_BUILDS_DIR/gitlab-kitware-sciviz-ci"
    CCACHE_BASEDIR:           "$CI_PROJECT_DIR"
    CCACHE_COMPILERCHECK:     "content"
    CCACHE_NOHASHDIR:         "true"
    CCACHE_RESHARE:           "true"
    CCACHE_INSTALL_DIR:       "$CI_PROJECT_DIR/.gitlab"

.fedora42:
  extends: .linux
  image: "diatomic/diy:ci-diy-fedora-20260609"

.fedora42_mpich: &fedora42_mpich
  extends: .fedora42
  variables:
    CMAKE_CONFIGURATION: fedora42_mpich
    # MPICH POSIX SHM iqueue calls glibc SVE memset (__memset_sve_zva64) on a
    # shared memory region whose page attributes are incompatible with the ZVA
    # instruction in Docker containers, causing a bus error on MPI_Init.
    MPIR_CVAR_ENABLE_SHM: 0
    # Exclude PSM3/psmx3 libfabric provider — causes bus errors on MPI_Init
    # when libfabric probes OmniPath hardware unavailable in containers.
    FI_PROVIDER: "^psm3,psmx3"

.fedora42_mpich_nothreads: &fedora42_mpich_nothreads
  extends: .fedora42_mpich
  variables:
    CMAKE_CONFIGURATION: fedora42_mpich_nothreads

.fedora42_openmpi: &fedora42_openmpi
  extends: .fedora42
  variables:
    CMAKE_CONFIGURATION: fedora42_openmpi
    OMPI_ALLOW_RUN_AS_ROOT: 1
    OMPI_ALLOW_RUN_AS_ROOT_CONFIRM: 1
    # Force BTL as the PML
    OMPI_MCA_pml: "ob1"
    # Exclude vader BTL due to shm limitations
    OMPI_MCA_btl: "self,tcp"
    # Use TCP BTL as UCX backend (as opposed to libfabric)
    UCX_TLS: "tcp"
    # Provide explicit path to prterun required by OpenMPI 5.x
    OMPI_PRTERUN: /usr/lib64/openmpi/bin/prterun
    # Ignore hwloc warnings
    HWLOC_HIDE_ERRORS: 0
    # Be verbose
    OMPI_MCA_btl_base_verbose: 20

.fedora42_memcheck: &fedora42_memcheck
  extends: .fedora42_mpich
  variables:
    CMAKE_BUILD_TYPE: RelWithDebInfo

.fedora42_asan: &fedora42_asan
  extends: .fedora42_memcheck
  variables:
    CMAKE_CONFIGURATION: fedora42_asan
    CTEST_MEMORYCHECK_TYPE: AddressSanitizer

.fedora42_ubsan: &fedora42_ubsan
  extends: .fedora42_memcheck

  variables:
    CMAKE_CONFIGURATION: fedora42_ubsan
    CTEST_MEMORYCHECK_TYPE: UndefinedBehaviorSanitizer

## Linux-specific scripts
.before_script_linux: &before_script_linux
  - .gitlab/ci/cmake.sh
  - export PATH=$PWD/.gitlab/cmake/bin:$PATH
  - cmake -VV -P .gitlab/ci/ninja.cmake
  - export PATH=$PWD/.gitlab:$PWD/.gitlab/cmake/bin:$PATH
  - cmake --version
  - ninja --version

.cmake_build_linux:
  stage: build
  script:
    - *before_script_linux
    - export PATH=$PWD/.gitlab/ccache:$PATH
    - cmake -VV -P .gitlab/ci/ccache.cmake
    - ccache -z
    - ccache -s
    - ctest -VV -S .gitlab/ci/ctest_configure.cmake
    - ctest -VV -S .gitlab/ci/ctest_build.cmake | tee build/ctest_build_output.log 2>&1
    - ccache -s
  interruptible: true

.cmake_test_linux:
  stage: test
  script:
    - *before_script_linux
    - ctest -V --output-on-failure -S .gitlab/ci/ctest_test.cmake | tee build/ctest_test_output.log 2>&1
  interruptible: true

.cmake_memcheck_linux:
  stage: test
  script:
    - *before_script_linux
    - ctest --output-on-failure -V -S .gitlab/ci/ctest_memcheck.cmake
  interruptible: true
