---
include:
  - local: .gitlab/artifacts.yml
  - local: .gitlab/rules.yml

  # OS builds.
  - local: .gitlab/os-linux.yml

stages:
  - build
  - test

.linux_builder_tags:
  tags:
    - hpsf-x86_64

build:fedora36-mpich:
  extends:
    - .fedora36_mpich
    - .cmake_build_linux
    - .linux_builder_tags
    - .cmake_build_artifacts
    - .rules

test:fedora36-mpich:
  extends:
    - .fedora36_mpich
    - .cmake_test_linux
    - .linux_builder_tags
    - .rules
  needs:
    - build:fedora36-mpich
