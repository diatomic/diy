    - .fedora36_openmpi
    - .cmake_build_linux
    - .linux_builder_tags
    - .cmake_build_artifacts
    - .rules

test:fedora36-openmpi:
  extends:
    - .fedora36_openmpi
    - .cmake_test_linux
    - .linux_builder_tags
    - .cmake_annotation_artifacts
    - .rules
  needs:
    - build:fedora36-openmpi

build:fedora36-asan:
  extends:
