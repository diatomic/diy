---
# yamllint disable rule:colons
include:
  # Metadata shared my many jobs
  - local: .gitlab/rules.yml
  - local: .gitlab/artifacts.yml

  # OS builds.
  - local: .gitlab/os-linux.yml
  - local: .gitlab/os-windows.yml

stages:
  - build
  - test
  - trigger

################################################################################
# Job declarations
#
# Each job must pull in each of the following keys:
#
#   - a "base image"
#   - a build script
#   - tags for the jobs
#     - already provided for upload and CI update jobs
#   - the `.rules` block
#     - see `.gitlab/rules.yml` for variables jobs may set to control when the
#       job is executed
#
# Additionally, jobs may also contain:
#
#   - artifacts
#   - needs jobs for required jobs
################################################################################

# CI strategy for DIY.
#
# Builders:
#
# - Fedora 34
#   * ci/docker/fedora36
#     - includes mpich and openmpi
# - Windows 10 VS2022
#
# Wanted test sets:
# - OS
#   - macOS
# - Checkers
#   - clang-tidy?

trigger:spack:
  stage: trigger
  needs: []
  rules:
    - if: '$CI_MERGE_REQUEST_ID'
  variables:
    GIT_STRATEGY: none
  image: alpine:latest
  tags:
    - diy
    - docker
    - linux-x86_64
  before_script:
    - apk add --no-cache curl
  script:
    - |
      curl --fail --silent --request POST \
        --form "token=$SPACK_TRIGGER_TOKEN" \
        --form "ref=$CI_COMMIT_REF_NAME" \
        --form "variables[UPSTREAM_PROJECT_ID]=$CI_PROJECT_ID" \
        --form "variables[UPSTREAM_COMMIT_SHA]=$CI_COMMIT_SHA" \
        "https://gitlab.spack.io/api/v4/projects/diatomic%2Fdiy/trigger/pipeline"

.linux_builder_tags:
  tags:
    - diy
    - build
    - docker
    - linux-x86_64

.linux_tester_priv_tags:
  tags:
    - diy
    - docker
    - linux-x86_64
    - privileged

.windows_tags:
  tags:
    - diy
    - nonconcurrent
    - windows-x86_64
    - shell
    - vs2022
    - msvc-19.33

build:fedora36-mpich:
  extends:
    - .fedora36_mpich
    - .cmake_build_linux
    - .linux_builder_tags
    - .cmake_build_artifacts
    - .rules

test:fedora36-mpich:
  extends:
    - .fedora36_mpich
    - .cmake_test_linux
    - .linux_builder_tags
    - .cmake_annotation_artifacts
    - .rules
  needs:
    - build:fedora36-mpich

build:fedora36-mpich-nothreads:
  extends:
    - .fedora36_mpich_nothreads
    - .cmake_build_linux
    - .linux_builder_tags
    - .cmake_build_artifacts
    - .rules

test:fedora36-mpich-nothreads:
  extends:
    - .fedora36_mpich_nothreads
    - .cmake_test_linux
    - .linux_builder_tags
    - .cmake_annotation_artifacts
    - .rules
  needs:
    - build:fedora36-mpich-nothreads

build:fedora36-openmpi:
