---
# yamllint disable rule:colons
include:
  # Metadata shared my many jobs
  - local: .gitlab/rules.yml
  - local: .gitlab/artifacts.yml

  # OS builds.
  - local: .gitlab/os-linux.yml
  - local: .gitlab/os-windows.yml

stages:
  - build
  - test

################################################################################
# Job declarations
#
# Each job must pull in each of the following keys:
#
#   - a "base image"
#   - a build script
#   - tags for the jobs
#     - already provided for upload and CI update jobs
#   - the `.rules` block
#     - see `.gitlab/rules.yml` for variables jobs may set to control when the
#       job is executed
#
# Additionally, jobs may also contain:
#
#   - artifacts
#   - needs jobs for required jobs
################################################################################

# CI strategy for DIY.
#
# Builders:
#
# - Fedora 34
#   * ci/docker/fedora42
#     - includes mpich and openmpi
# - Windows 10 VS2022
#
# Wanted test sets:
# - OS
#   - macOS
# - Checkers
#   - clang-tidy?
#
# DIY_SPACK_REPO_TOKEN: a GitLab project access token for the spack GitLab
# instance (gitlab.spack.io) with `write_repository` scope.
# Create it at https://gitlab.spack.io/diatomic/diy/-/settings/access_tokens
# and store it as a CI/CD variable (Masked and non-protected) in the Kitware project.

external:spack:
  stage: .pre
  needs: []
  extends:
    - .rules
  image: alpine:latest
  environment: spack
  variables:
    GIT_STRATEGY: fetch
  tags:
    - diy
    - build
    - docker
    - linux-x86_64
  before_script:
    - apk add --no-cache git
  script:
    - |
      test -n "$DIY_SPACK_REPO_TOKEN" || { echo "DIY_SPACK_REPO_TOKEN is not set"; exit 1; }
      git push --force "https://spack-ci-bot:$DIY_SPACK_REPO_TOKEN@gitlab.spack.io/diatomic/diy.git" \
        "HEAD:refs/heads/$CI_COMMIT_REF_NAME"

.linux_builder_tags:
  tags:
    - diy
    - build
    - docker
    - linux-x86_64

.linux_tester_priv_tags:
  tags:
    - diy
    - docker
    - linux-x86_64
    - privileged

.windows_tags:
  tags:
    - diy
    - nonconcurrent
    - windows-x86_64
    - shell
    - vs2022
    - msvc-19.33

build:fedora42-mpich:
  extends:
    - .fedora42_mpich
    - .cmake_build_linux
    - .linux_builder_tags
    - .cmake_build_artifacts
    - .rules

test:fedora42-mpich:
  extends:
    - .fedora42_mpich
    - .cmake_test_linux
    - .linux_builder_tags
    - .cmake_annotation_artifacts
    - .rules
  needs:
    - build:fedora42-mpich

