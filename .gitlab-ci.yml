build:fedora36-ubsan:
  extends:
    - .fedora36_ubsan
    - .cmake_build_linux
    - .linux_builder_tags
    - .cmake_build_artifacts
    - .rules

test:fedora36-ubsan:
  extends:
    - .fedora36_ubsan
    - .cmake_memcheck_linux
    - .linux_tester_priv_tags
    - .cmake_annotation_artifacts
    - .rules
  needs:
    - build:fedora36-ubsan

build:windows_vs2022_debug:
